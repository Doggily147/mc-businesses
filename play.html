<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MC Clone — Play</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<style>
  body { overflow: hidden; }
  .game-bar {
    display: flex; gap: 10px; align-items: center; justify-content: space-between;
    padding: 8px 14px; background: var(--panel); border-bottom: 2px solid var(--border);
  }
  .game-bar .left, .game-bar .right { display: flex; gap: 10px; align-items: center; }
  .game-bar input { padding: 6px 10px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; font: inherit; }
  .game-bar input[readonly] { color: var(--muted); }
  .game-bar .small-btn { padding: 6px 12px; font-size: 13px; }
  #saveStatus { font-size: 12px; color: var(--muted); }
  #saveStatus .ok { color: var(--accent); }
  #saveStatus .err { color: var(--danger); }

  #stage {
    position: relative; width: 100vw; height: calc(100vh - 50px); background: #6db0ff;
  }
  #game { display: block; width: 100%; height: 100%; cursor: crosshair; image-rendering: pixelated; }

  /* Hotbar */
  #hotbar {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; background: rgba(0,0,0,0.4); padding: 6px; border-radius: 6px;
  }
  .slot { width: 44px; height: 44px; border: 2px solid #444; background: #222; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; }
  .slot.active { border-color: var(--accent); }

  /* Chat */
  #chatPanel {
    position: absolute; bottom: 70px; left: 12px; width: 320px; max-height: 200px;
    background: rgba(0,0,0,0.55); padding: 8px; border-radius: 6px; color: #fff; font-size: 13px;
    display: flex; flex-direction: column; gap: 4px;
  }
  #chatLog { flex: 1; overflow-y: auto; max-height: 160px; }
  #chatLog .msg { padding: 2px 0; line-height: 1.3; }
  #chatLog .me { color: var(--accent); }
  #chatInput { padding: 5px 8px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #555; border-radius: 4px; font: inherit; }

  #playerCount { position: absolute; top: 8px; right: 12px; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 4px; color: #fff; font-size: 12px; }
  #helpToast { position: absolute; top: 8px; left: 12px; background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 4px; color: #fff; font-size: 12px; }
</style>
</head>
<body>

<div class="game-bar">
  <div class="left">
    <a href="index.html" class="back">←</a>
    <input id="playUser" type="text" value="bubbu" maxlength="16" placeholder="Username">
    <input id="playPass" type="password" value="bubbo" maxlength="60" placeholder="Save passphrase">
    <button id="pickFolderBtn" class="small-btn primary">Pick save folder</button>
    <span id="saveStatus" class="muted">Pick a folder to start auto-saving every 5s.</span>
  </div>
  <div class="right">
    <span class="muted small">Server: 51.161.199.30:26410 · v1.21.11 · godlike gowesting</span>
  </div>
</div>

<div id="stage">
  <canvas id="game" width="1280" height="720"></canvas>

  <div id="helpToast">WASD move · Space jump · Left-click break · Right-click place · 1-6 select · T chat</div>
  <div id="playerCount">👥 1</div>

  <div id="chatPanel">
    <div id="chatLog"></div>
    <input id="chatInput" placeholder="Press T to chat, Enter to send" />
  </div>

  <div id="hotbar"></div>
</div>

<!-- Firebase (optional — multiplayer if configured) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="play.js"></script>
</body>
</html>
