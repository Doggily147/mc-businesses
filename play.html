<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MC Clone — 3D, live-synced to your server</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<style>
  body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #87ceeb; }
  #stage { position: fixed; inset: 0; }
  #game { display: block; width: 100%; height: 100%; cursor: crosshair; }
  .hud {
    position: fixed; left: 0; right: 0; pointer-events: none;
    color: #fff; font: 13px/1.2 system-ui;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }
  #topbar { top: 8px; padding: 0 12px; display: flex; justify-content: space-between; gap: 12px; }
  #topbar > * { background: rgba(0,0,0,0.45); padding: 6px 10px; border-radius: 4px; pointer-events: auto; }
  #botbar { bottom: 8px; text-align: center; }
  #crosshair {
    position: fixed; top: 50%; left: 50%; width: 18px; height: 18px;
    margin: -9px 0 0 -9px; pointer-events: none;
    border: 2px solid rgba(255,255,255,0.85);
    border-radius: 50%;
  }
  #crosshair::before, #crosshair::after {
    content:''; position:absolute; background:#fff;
  }
  #crosshair::before { top: 7px; left: -6px; width: 6px; height: 2px; }
  #crosshair::after  { left: 7px; top: -6px; height: 6px; width: 2px; }

  #hotbar {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; background: rgba(0,0,0,0.4); padding: 6px; border-radius: 6px;
    pointer-events: auto;
  }
  .slot {
    width: 44px; height: 44px; border: 2px solid #444; background: #222;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #fff; cursor: pointer;
  }
  .slot.active { border-color: var(--accent, #5fc97c); }

  #chatPanel {
    position: fixed; bottom: 70px; left: 12px; width: 340px; max-height: 220px;
    background: rgba(0,0,0,0.55); padding: 8px; border-radius: 6px; color: #fff; font-size: 13px;
    display: flex; flex-direction: column; gap: 4px; pointer-events: auto;
  }
  #chatLog { flex: 1; overflow-y: auto; max-height: 180px; }
  #chatLog .msg { padding: 2px 0; line-height: 1.3; }
  #chatLog .me { color: var(--accent, #5fc97c); }
  #chatInput {
    padding: 5px 8px; background: rgba(0,0,0,0.5); color: #fff;
    border: 1px solid #555; border-radius: 4px; font: inherit;
  }

  #saveStatus { font-size: 12px; }
  #saveStatus .ok { color: #5fc97c; }
  #saveStatus .err { color: #e25c5c; }

  #lockNotice {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.8); color: #fff; padding: 24px 32px;
    border-radius: 12px; font-size: 16px; text-align: center;
    cursor: pointer; pointer-events: auto;
  }
  #lockNotice h2 { margin-bottom: 10px; }
  #lockNotice .muted { font-size: 12px; color: #aaa; margin-top: 10px; }
</style>
</head>
<body>

<div id="stage">
  <canvas id="game"></canvas>
</div>

<div id="crosshair" hidden></div>

<div class="hud" id="topbar">
  <div>
    <a href="index.html" style="color:#fff">←</a>
    <span id="playerCount" style="margin-left:12px">👥 1</span>
    <span id="chunkCount" style="margin-left:12px">🗺️ 0 chunks</span>
  </div>
  <div>
    <input id="playUser" type="text" value="bubbu" maxlength="16" placeholder="Username" style="background:#0006;color:#fff;border:1px solid #555;border-radius:3px;padding:3px 6px;font:inherit;width:90px">
    <input id="playPass" type="password" value="bubbo" maxlength="60" placeholder="Save passphrase" style="background:#0006;color:#fff;border:1px solid #555;border-radius:3px;padding:3px 6px;font:inherit;width:120px">
    <button id="pickFolderBtn" style="font:inherit;padding:3px 8px;cursor:pointer">📁 Save folder</button>
    <span id="saveStatus">Pick a folder for 5s autosave</span>
  </div>
</div>

<div id="hotbar"></div>

<div id="chatPanel">
  <div id="chatLog"></div>
  <input id="chatInput" placeholder="T to chat, Enter to send" />
</div>

<div id="lockNotice">
  <h2>Click to play</h2>
  <div>WASD move · Space jump · Shift sneak · Mouse look</div>
  <div>Left-click break · Right-click place · 1-7 select · T chat · Esc release</div>
  <div class="muted">Loading world from Firebase...</div>
</div>

<!-- Three.js (ESM). Connects to world-server via plain WebSocket (no Firebase). -->
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module" src="play.js"></script>
</body>
</html>
